<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 52">
  <defs>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#1E3A8A"/>
    </linearGradient>
  </defs>
  <!-- Icon box -->
  <rect width="44" height="44" rx="10" x="0" y="4" fill="url(#iconBg)"/>
  <!-- Accent bar -->
  <rect x="10" y="14" width="24" height="3" rx="1.5" fill="white" opacity="0.4"/>
  <!-- SKM monogram -->
  <text x="22" y="37" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="16" fill="white" text-anchor="middle" letter-spacing="-0.5">SKM</text>
  <!-- App name -->
  <text x="56" y="28" font-family="Arial, sans-serif" font-weight="700" font-size="17" fill="#F1F5F9" letter-spacing="-0.3">LoanTrack</text>
  <!-- Sub label -->
  <text x="56" y="43" font-family="Arial, sans-serif" font-weight="400" font-size="11" fill="#94A3B8" letter-spacing="0.2">Financial Services</text>
</svg>
